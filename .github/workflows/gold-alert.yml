name: Gold Signal Alert

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: gold-alert
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore last signal state
        uses: actions/cache@v4
        with:
          path: last_signal.json
          key: gold-signal-${{ github.run_id }}
          restore-keys: |
            gold-signal-

      - name: Run alert check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TIMEFRAME: "1h"
        run: python gold_alert.py
