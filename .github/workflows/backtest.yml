name: Gold Backtest

on:
  workflow_dispatch:
    inputs:
      interval:
        description: "ไทม์เฟรม (60m / 1d / 15m)"
        default: "60m"
      range:
        description: "ช่วงย้อนหลัง (2y / 1y / 60d)"
        default: "2y"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backtest
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BT_INTERVAL: ${{ inputs.interval }}
          BT_RANGE: ${{ inputs.range }}
        run: python backtest.py
